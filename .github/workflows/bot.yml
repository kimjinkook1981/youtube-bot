name: YouTube Trend Bot

on:
  push: # 🔥 저장하자마자 1회 즉시 실행!
  schedule:
    - cron: '0 * * * *' # 매시간 정각마다 알아서 실행 (하루 24번)
  workflow_dispatch: # 수동 버튼 실행

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: 파이썬 설치
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: 유튜브 통신 부품(라이브러리) 설치
      run: |
        python -m pip install --upgrade pip
        pip install google-api-python-client
        
    - name: 파이썬 봇 실행!
      run: python youtube_bot.py
