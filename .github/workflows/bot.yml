name: 낚시 랭킹 자동 업데이트

on:
  schedule:
    # 한국 시간 기준 매일 오전 9시, 오후 9시에 실행! (UTC 기준 0시, 12시)
    - cron: '0 0,12 * * *'
  workflow_dispatch: # 우리가 원할 때 수동으로 버튼 눌러서 실행할 수 있는 기능!

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: 파이썬 환경 세팅
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필요한 부품(라이브러리) 설치
      run: |
        python -m pip install --upgrade pip
        pip install google-api-python-client

    - name: 파이썬 로봇 실행!
      # ⚠️ 만약 파이썬 파일 이름이 다르면 아래 youtube_bot.py 부분을 수정해주세요!
      run: python youtube_bot.py
