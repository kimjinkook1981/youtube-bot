name: YouTube Trend Bot

on:
  schedule: # 자동으로 실행될 시간 설정
    - cron: '0 * * * *' # 매시간 정각마다 실행 (하루 24번)
  workflow_dispatch: # 수동으로도 버튼 눌러서 실행 가능하게 함

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: 파이썬 설치
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: 유튜브 통신 부품(라이브러리) 설치
      run: |
        python -m pip install --upgrade pip
        pip install google-api-python-client
        
    - name: 파이썬 봇 실행!
      run: python youtube_bot.py
